<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="oglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="10" fill="#080814"/>

  <!-- Subtle crosshair -->
  <line x1="100" y1="65" x2="100" y2="135" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="65" y1="100" x2="135" y2="100" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Back face edges ABCD — dim cyan -->
  <!-- Edge AB: A→B -->
  <line x1="83.2" y1="83.2" x2="116.8" y2="83.2" stroke="#00d4ff" stroke-width="1.4" opacity="0.35" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="83.2;100;116.8;117.0;109.3;100;90.7;83.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="83.2;79.9;83.2;88.0;90.7;91.5;90.7;88.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="116.8;117.0;109.3;100;90.7;83.0;83.2;100;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="83.2;88.0;90.7;91.5;90.7;88.0;83.2;79.9;83.2" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge BC: B→C -->
  <line x1="116.8" y1="83.2" x2="116.8" y2="116.8" stroke="#00d4ff" stroke-width="1.4" opacity="0.35" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="116.8;117.0;109.3;100;90.7;83.0;83.2;100;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="83.2;88.0;90.7;91.5;90.7;88.0;83.2;79.9;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="116.8;117.0;109.3;100;90.7;83.0;83.2;100;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="116.8;112.0;109.3;108.6;109.3;112.0;116.8;120.1;116.8" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge CD: C→D -->
  <line x1="116.8" y1="116.8" x2="83.2" y2="116.8" stroke="#00d4ff" stroke-width="1.4" opacity="0.35" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="116.8;117.0;109.3;100;90.7;83.0;83.2;100;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="116.8;112.0;109.3;108.6;109.3;112.0;116.8;120.1;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="83.2;100;116.8;117.0;109.3;100;90.7;83.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="116.8;120.1;116.8;112.0;109.3;108.6;109.3;112.0;116.8" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge DA: D→A -->
  <line x1="83.2" y1="116.8" x2="83.2" y2="83.2" stroke="#00d4ff" stroke-width="1.4" opacity="0.35" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="83.2;100;116.8;117.0;109.3;100;90.7;83.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="116.8;120.1;116.8;112.0;109.3;108.6;109.3;112.0;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="83.2;100;116.8;117.0;109.3;100;90.7;83.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="83.2;79.9;83.2;88.0;90.7;91.5;90.7;88.0;83.2" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Front face edges EFGH — bright cyan -->
  <!-- Edge EF: E→F -->
  <line x1="90.7" y1="90.7" x2="109.3" y2="90.7" stroke="#00d4ff" stroke-width="2" opacity="0.95" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="90.7;83.0;83.2;100;116.8;117.0;109.3;100;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="90.7;88.0;83.2;79.9;83.2;88.0;90.7;91.5;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="109.3;100;90.7;83.0;83.2;100;116.8;117.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="90.7;91.5;90.7;88.0;83.2;79.9;83.2;88.0;90.7" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge FG: F→G -->
  <line x1="109.3" y1="90.7" x2="109.3" y2="109.3" stroke="#00d4ff" stroke-width="2" opacity="0.95" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="109.3;100;90.7;83.0;83.2;100;116.8;117.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="90.7;91.5;90.7;88.0;83.2;79.9;83.2;88.0;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="109.3;100;90.7;83.0;83.2;100;116.8;117.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="109.3;108.6;109.3;112.0;116.8;120.1;116.8;112.0;109.3" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge GH: G→H -->
  <line x1="109.3" y1="109.3" x2="90.7" y2="109.3" stroke="#00d4ff" stroke-width="2" opacity="0.95" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="109.3;100;90.7;83.0;83.2;100;116.8;117.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="109.3;108.6;109.3;112.0;116.8;120.1;116.8;112.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="90.7;83.0;83.2;100;116.8;117.0;109.3;100;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="109.3;112.0;116.8;120.1;116.8;112.0;109.3;108.6;109.3" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge HE: H→E -->
  <line x1="90.7" y1="109.3" x2="90.7" y2="90.7" stroke="#00d4ff" stroke-width="2" opacity="0.95" fill="none" filter="url(#glow)">
    <animate attributeName="x1" values="90.7;83.0;83.2;100;116.8;117.0;109.3;100;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="109.3;112.0;116.8;120.1;116.8;112.0;109.3;108.6;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="90.7;83.0;83.2;100;116.8;117.0;109.3;100;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="90.7;88.0;83.2;79.9;83.2;88.0;90.7;91.5;90.7" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Connecting edges AE, BF, CG, DH — orange -->
  <!-- Edge AE: A→E -->
  <line x1="83.2" y1="83.2" x2="90.7" y2="90.7" stroke="#ff6b35" stroke-width="1.6" opacity="0.75" fill="none" filter="url(#oglow)">
    <animate attributeName="x1" values="83.2;100;116.8;117.0;109.3;100;90.7;83.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="83.2;79.9;83.2;88.0;90.7;91.5;90.7;88.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="90.7;83.0;83.2;100;116.8;117.0;109.3;100;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="90.7;88.0;83.2;79.9;83.2;88.0;90.7;91.5;90.7" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge BF: B→F -->
  <line x1="116.8" y1="83.2" x2="109.3" y2="90.7" stroke="#ff6b35" stroke-width="1.6" opacity="0.75" fill="none" filter="url(#oglow)">
    <animate attributeName="x1" values="116.8;117.0;109.3;100;90.7;83.0;83.2;100;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="83.2;88.0;90.7;91.5;90.7;88.0;83.2;79.9;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="109.3;100;90.7;83.0;83.2;100;116.8;117.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="90.7;91.5;90.7;88.0;83.2;79.9;83.2;88.0;90.7" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge CG: C→G -->
  <line x1="116.8" y1="116.8" x2="109.3" y2="109.3" stroke="#ff6b35" stroke-width="1.6" opacity="0.75" fill="none" filter="url(#oglow)">
    <animate attributeName="x1" values="116.8;117.0;109.3;100;90.7;83.0;83.2;100;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="116.8;112.0;109.3;108.6;109.3;112.0;116.8;120.1;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="109.3;100;90.7;83.0;83.2;100;116.8;117.0;109.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="109.3;108.6;109.3;112.0;116.8;120.1;116.8;112.0;109.3" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Edge DH: D→H -->
  <line x1="83.2" y1="116.8" x2="90.7" y2="109.3" stroke="#ff6b35" stroke-width="1.6" opacity="0.75" fill="none" filter="url(#oglow)">
    <animate attributeName="x1" values="83.2;100;116.8;117.0;109.3;100;90.7;83.0;83.2" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="116.8;120.1;116.8;112.0;109.3;108.6;109.3;112.0;116.8" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="90.7;83.0;83.2;100;116.8;117.0;109.3;100;90.7" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="109.3;112.0;116.8;120.1;116.8;112.0;109.3;108.6;109.3" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Center vertex dot -->
  <circle cx="100" cy="100" r="2.5" fill="#a855f7" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="100" y="176" text-anchor="middle" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="10" fill="#4a5568" letter-spacing="2">.GLB · .GLTF</text>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.08"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="5,14" opacity="0.15">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" additive="sum"/>
  </circle>
</svg>
